<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Aziz.bot mini o‘yin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d2333, #020617);
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 { font-size: 22px; margin-bottom: 6px; text-align: center; }
    p { font-size: 14px; color: #9ca3af; margin-bottom: 10px; text-align: center; }
    #game-container {
      margin-top: 12px;
      background: #020617;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 10px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.8);
    }
    canvas {
      display: block;
      background: radial-gradient(circle at top, #111827, #020617);
      border-radius: 12px;
      touch-action: none;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 13px;
      color: #d1d5db;
    }
    #btn-row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #6366f1;
      background: #4f46e5;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .btn.secondary {
      background: transparent;
      color: #c7d2fe;
    }
    #msg { margin-top: 8px; font-size: 13px; color: #fbbf24; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Aziz.bot — tezkor mini o‘yin</h1>
  <p>Har safar ko‘k doirani bos / teg — vaqt tugamasidan iloji boricha ko‘p ball to‘pla.</p>

  <div id="game-container">
    <canvas id="game" width="320" height="420"></canvas>
    <div id="hud">
      <span>Ball: <span id="score">0</span></span>
      <span>Vaqt: <span id="time">30</span>s</span>
    </div>
    <div id="btn-row">
      <button class="btn" id="startBtn">O‘yinni boshlash</button>
      <button class="btn secondary" id="backBtn">Asosiy sahifaga qaytish</button>
    </div>
    <div id="msg"></div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const msgEl = document.getElementById('msg');
    const startBtn = document.getElementById('startBtn');
    const backBtn = document.getElementById('backBtn');

    const state = {
      playing: false,
      score: 0,
      time: 30,
      circle: { x: 160, y: 210, r: 22 },
      lastTick: 0
    };

    function resetGame() {
      state.playing = false;
      state.score = 0;
      state.time = 30;
      scoreEl.textContent = '0';
      timeEl.textContent = '30';
      msgEl.textContent = '';
      drawScene();
    }

    function randomCircle() {
      const padding = 30;
      state.circle.x = padding + Math.random() * (canvas.width - padding * 2);
      state.circle.y = padding + Math.random() * (canvas.height - padding * 2);
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // fon yulduzlar
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(148,163,184,0.3)';
      for (let i = 0; i < 25; i++) {
        const x = (i * 37) % canvas.width;
        const y = (i * 53) % canvas.height;
        ctx.fillRect(x, y, 2, 2);
      }

      // maqsad doira
      const c = state.circle;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r + 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(59,130,246,0.4)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(c.x - 10, c.y - 10, 4, c.x, c.y, c.r);
      grad.addColorStop(0, '#bfdbfe');
      grad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = grad;
      ctx.fill();

      if (!state.playing) {
        ctx.fillStyle = 'rgba(15,23,42,0.8)';
        ctx.fillRect(20, canvas.height / 2 - 40, canvas.width - 40, 80);
        ctx.fillStyle = '#e5e7eb';
        ctx.font = '16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('Boshlash uchun pastdagi', canvas.width / 2, canvas.height / 2 - 5);
        ctx.fillText('“O‘yinni boshlash” tugmasini bosing', canvas.width / 2, canvas.height / 2 + 15);
      }
    }

    function gameLoop(timestamp) {
      if (!state.playing) return;

      if (!state.lastTick) state.lastTick = timestamp;
      const delta = (timestamp - state.lastTick) / 1000;
      if (delta >= 1) {
        state.time -= 1;
        timeEl.textContent = state.time;
        state.lastTick = timestamp;
        if (state.time <= 0) {
          state.playing = false;
          msgEl.textContent = 'Vaqt tugadi! Yakuniy ball: ' + state.score;
        }
      }
      drawScene();
      if (state.playing) requestAnimationFrame(gameLoop);
    }

    function handleTap(x, y) {
      if (!state.playing) return;
      const dx = x - state.circle.x;
      const dy = y - state.circle.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= state.circle.r + 8) {
        state.score += 1;
        scoreEl.textContent = state.score;
        msgEl.textContent = 'Ajoyib! Ball: ' + state.score;
        randomCircle();
      } else {
        msgEl.textContent = 'O‘tkazib yubordingiz 😅';
      }
      drawScene();
    }

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      handleTap(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      handleTap(t.clientX - rect.left, t.clientY - rect.top);
    }, { passive: false });

    startBtn.addEventListener('click', () => {
      resetGame();
      state.playing = true;
      state.lastTick = 0;
      randomCircle();
      requestAnimationFrame(gameLoop);
    });

    backBtn.addEventListener('click', () => {
      window.location.href = './';
    });

    resetGame();
  </script>
</body>
</html>
